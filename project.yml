name: SmartClipboardAI

options:
  bundleIdPrefix: com.azamat
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.2.0

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # "Sign to Run Locally" — builds the sandboxed app without a dev team (MVP §1).
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""

targets:
  SmartClipboardAI:
    type: application
    platform: macOS
    sources:
      - path: SmartClipboardAI
        excludes:
          - "Resources/**"
    info:
      path: SmartClipboardAI/Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Smart Clipboard AI
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    entitlements:
      path: SmartClipboardAI/Resources/SmartClipboardAI.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.azamat.SmartClipboardAI
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: KeyboardShortcuts

  SmartClipboardAITests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SmartClipboardAITests
    dependencies:
      - target: SmartClipboardAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.azamat.SmartClipboardAITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SmartClipboardAI:
    build:
      targets:
        SmartClipboardAI: all
        SmartClipboardAITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SmartClipboardAITests
